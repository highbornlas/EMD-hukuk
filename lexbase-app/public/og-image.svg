<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0F19"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#E8C64A"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldGrad)"/>

  <!-- Shield logo -->
  <g transform="translate(120, 200)">
    <path d="M40 5L10 20v20c0 18 12.8 34.8 30 40 17.2-5.2 30-22 30-40V20L40 5z" fill="#0B0F19" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
    <line x1="27" y1="27" x2="53" y2="27" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="22" x2="40" y2="32" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
    <text x="40" y="56" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#D4AF37">L</text>
  </g>

  <!-- LexBase text -->
  <text x="200" y="240" font-family="serif" font-size="48" font-weight="bold">
    <tspan fill="#D4AF37">Lex</tspan><tspan fill="#ffffff">Base</tspan>
  </text>

  <!-- Main heading -->
  <text x="120" y="340" font-family="serif" font-size="56" font-weight="bold" fill="white">
    Hukuk Buronuzu
  </text>
  <text x="120" y="410" font-family="serif" font-size="56" font-weight="bold" fill="url(#goldGrad)">
    Dijitale Tasiyin.
  </text>

  <!-- Subtitle -->
  <text x="120" y="470" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.4)">
    Muvekkil yonetimi, dava takibi, finans ve takvim — tek platformda.
  </text>

  <!-- Feature icons strip -->
  <g transform="translate(120, 530)">
    <rect x="0" y="0" width="100" height="36" rx="8" fill="rgba(212,175,55,0.1)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
    <text x="50" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(212,175,55,0.7)">12+ Modul</text>

    <rect x="120" y="0" width="130" height="36" rx="8" fill="rgba(212,175,55,0.1)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
    <text x="185" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(212,175,55,0.7)">100% Guvenli</text>

    <rect x="270" y="0" width="130" height="36" rx="8" fill="rgba(212,175,55,0.1)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
    <text x="335" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(212,175,55,0.7)">7/24 Erisim</text>
  </g>

  <!-- Right side: mini dashboard mockup -->
  <g transform="translate(700, 100)">
    <rect x="0" y="0" width="420" height="430" rx="16" fill="#131A2B" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Browser bar -->
    <rect x="0" y="0" width="420" height="36" rx="16" fill="#1C2333"/>
    <rect x="0" y="20" width="420" height="16" fill="#1C2333"/>
    <circle cx="20" cy="18" r="5" fill="#e74c3c" opacity="0.6"/>
    <circle cx="36" cy="18" r="5" fill="#f39c12" opacity="0.6"/>
    <circle cx="52" cy="18" r="5" fill="#2ecc71" opacity="0.6"/>

    <!-- KPI cards -->
    <rect x="20" y="55" width="90" height="50" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="35" y="82" font-family="serif" font-size="16" font-weight="bold" fill="#D4AF37">148</text>
    <text x="35" y="96" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.2)">AKTIF DAVA</text>

    <rect x="120" y="55" width="90" height="50" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="135" y="82" font-family="serif" font-size="16" font-weight="bold" fill="#2ecc71">284K</text>
    <text x="135" y="96" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.2)">GELIR</text>

    <rect x="220" y="55" width="90" height="50" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="235" y="82" font-family="serif" font-size="16" font-weight="bold" fill="white">27</text>
    <text x="235" y="96" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.2)">MUVEKKIL</text>

    <rect x="320" y="55" width="80" height="50" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="335" y="82" font-family="serif" font-size="16" font-weight="bold" fill="#e74c3c">5</text>
    <text x="335" y="96" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.2)">KRITIK</text>

    <!-- Table rows -->
    <rect x="20" y="120" width="380" height="30" rx="4" fill="rgba(255,255,255,0.01)"/>
    <text x="35" y="140" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">2026/1247</text>
    <text x="140" y="140" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">K. Yilmaz</text>
    <rect x="300" y="130" width="45" height="16" rx="4" fill="rgba(46,204,113,0.15)"/>
    <text x="310" y="142" font-family="sans-serif" font-size="9" fill="rgba(46,204,113,0.8)">Aktif</text>

    <rect x="20" y="155" width="380" height="30" rx="4" fill="rgba(255,255,255,0.01)"/>
    <text x="35" y="175" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">2026/0934</text>
    <text x="140" y="175" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Altin Yapi</text>
    <rect x="300" y="165" width="55" height="16" rx="4" fill="rgba(212,175,55,0.15)"/>
    <text x="310" y="177" font-family="sans-serif" font-size="9" fill="rgba(212,175,55,0.8)">Bekleme</text>
  </g>

  <!-- Bottom gold line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#goldGrad)"/>
</svg>
